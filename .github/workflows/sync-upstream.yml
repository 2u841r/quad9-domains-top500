name: Sync upstream

on:
  schedule:
    - cron: '2 10 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync from upstream
        run: |
          git remote add upstream https://github.com/Quad9DNS/quad9-domains-top500.git
          git fetch upstream
          git merge upstream/main --no-ff --allow-unrelated-histories -m "chore: sync upstream data"
          git push origin main
