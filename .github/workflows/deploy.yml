name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "dashboard/**"
      - "top500-*.json"
  workflow_run:
    workflows: ["Sync upstream"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      pages_artifact_name: ${{ steps.pages-artifact.outputs.name }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: refs/heads/main

      - uses: pnpm/action-setup@v6
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Set Pages artifact name
        id: pages-artifact
        run: echo "name=github-pages-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: dashboard
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: dashboard
        run: pnpm build

      - uses: actions/upload-pages-artifact@v5
        with:
          name: ${{ steps.pages-artifact.outputs.name }}
          path: dashboard/dist

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@v6

      - uses: actions/deploy-pages@v5
        id: deployment
        with:
          artifact_name: ${{ needs.build.outputs.pages_artifact_name }}
