name: Sync upstream

on:
  schedule:
    - cron: '2 10 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync from upstream
        run: |
          git config user.name "Zubair"
          git config user.email "zizdjbd@gmail.com"
          git remote add upstream https://github.com/Quad9DNS/quad9-domains-top500.git
          git fetch upstream
          latest_upstream_file="$(git diff --name-only HEAD..upstream/main -- 'top500-*.json' | sort | tail -n 1)"
          if [ -n "$latest_upstream_file" ]; then
            merge_msg="chore: sync upstream ${latest_upstream_file}"
          else
            merge_msg="chore: sync upstream data"
          fi
          git merge upstream/main --no-ff --allow-unrelated-histories -m "$merge_msg"
          git push origin main
